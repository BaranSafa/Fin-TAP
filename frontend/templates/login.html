<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign In — Fin-TAP</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #07090d; --surface: #0f1318; --surface2: #141920;
            --border: #1e2530; --border2: #2a3344;
            --accent: #00d4ff; --green: #00e676; --red: #ff4560;
            --text: #dde3ee; --text2: #8896ab; --text3: #4a5568;
            --mono: 'Space Mono', monospace; --sans: 'Syne', sans-serif;
        }
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: var(--sans);
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            overflow: hidden;
        }
        body::before {
            content: '';
            position: fixed; inset: 0;
            background-image:
                linear-gradient(rgba(0,212,255,0.025) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0,212,255,0.025) 1px, transparent 1px);
            background-size: 48px 48px;
            pointer-events: none;
        }
        body::after {
            content: '';
            position: fixed;
            width: 600px; height: 600px;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(0,212,255,0.05) 0%, transparent 70%);
            top: 50%; left: 50%; transform: translate(-50%,-50%);
            pointer-events: none;
        }

        .auth-wrap {
            position: relative; z-index: 1;
            width: 100%; max-width: 400px;
            padding: 20px;
        }

        .brand {
            text-align: center;
            margin-bottom: 32px;
        }
        .brand-mark {
            width: 48px; height: 48px;
            background: rgba(0,212,255,0.08);
            border: 1px solid rgba(0,212,255,0.25);
            border-radius: 12px;
            display: flex; align-items: center; justify-content: center;
            font-size: 1.3rem;
            margin: 0 auto 12px;
        }
        .brand-name {
            font-family: var(--mono);
            font-weight: 700;
            font-size: 1rem;
            color: var(--accent);
            letter-spacing: 3px;
        }
        .brand-sub {
            font-family: var(--mono);
            font-size: 0.6rem;
            color: var(--text3);
            letter-spacing: 3px;
            margin-top: 4px;
        }

        .auth-card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 14px;
            padding: 32px;
        }

        .auth-title {
            font-size: 1.2rem;
            font-weight: 800;
            margin-bottom: 6px;
        }
        .auth-sub {
            font-size: 0.8rem;
            color: var(--text2);
            margin-bottom: 28px;
        }

        .form-group { margin-bottom: 18px; }
        .form-label {
            display: block;
            font-size: 0.75rem;
            font-weight: 700;
            color: var(--text2);
            margin-bottom: 7px;
            letter-spacing: 0.3px;
        }
        .form-input {
            width: 100%;
            background: var(--surface2);
            border: 1px solid var(--border);
            color: var(--text);
            padding: 11px 14px;
            border-radius: 8px;
            font-size: 0.88rem;
            font-family: var(--sans);
            outline: none;
            transition: border-color 0.2s;
        }
        .form-input:focus { border-color: var(--accent); }
        .form-input::placeholder { color: var(--text3); }

        .btn-submit {
            width: 100%;
            background: var(--accent);
            color: #000;
            border: none;
            border-radius: 8px;
            padding: 12px;
            font-family: var(--sans);
            font-weight: 800;
            font-size: 0.9rem;
            cursor: pointer;
            transition: all 0.2s;
            letter-spacing: 0.5px;
            margin-top: 4px;
        }
        .btn-submit:hover { background: #fff; transform: translateY(-1px); }

        .divider {
            display: flex; align-items: center; gap: 12px;
            margin: 20px 0;
            font-size: 0.72rem;
            color: var(--text3);
            font-family: var(--mono);
        }
        .divider::before, .divider::after {
            content: ''; flex: 1; height: 1px; background: var(--border);
        }

        .auth-footer {
            text-align: center;
            font-size: 0.8rem;
            color: var(--text2);
            margin-top: 20px;
        }
        .auth-footer a { color: var(--accent); text-decoration: none; font-weight: 700; }
        .auth-footer a:hover { text-decoration: underline; }

        .alert {
            padding: 10px 14px;
            border-radius: 7px;
            font-size: 0.8rem;
            margin-bottom: 20px;
            display: flex; align-items: center; gap: 8px;
        }
        .alert-error { background: rgba(255,69,96,0.1); border: 1px solid rgba(255,69,96,0.3); color: #ff8fa3; }

        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(16px); }
            to   { opacity: 1; transform: translateY(0); }
        }
        .auth-wrap { animation: fadeUp 0.4s ease both; }

        .back-link {
            display: inline-flex; align-items: center; gap: 6px;
            font-family: var(--mono); font-size: 0.65rem;
            color: var(--text3); text-decoration: none;
            letter-spacing: 1px;
            margin-bottom: 20px;
            transition: color 0.15s;
        }
        .back-link:hover { color: var(--accent); }
    </style>
</head>
<body>
<div class="auth-wrap">
    <a href="/" class="back-link">← BACK TO HOME</a>

    <div class="brand">
        <div class="brand-mark">▲</div>
        <div class="brand-name">FIN-TAP</div>
        <div class="brand-sub">AI FINANCIAL ANALYSIS</div>
    </div>

    <div class="auth-card">
        <div class="auth-title">Welcome back</div>
        <div class="auth-sub">Sign in to access your predictions and wallet.</div>

        {% with messages = get_flashed_messages() %}
        {% if messages %}
        <div class="alert alert-error">
            <span>⚠</span> {{ messages[0] }}
        </div>
        {% endif %}
        {% endwith %}

        <form method="POST" action="/login">
            <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
            <div class="form-group">
                <label class="form-label">Email Address</label>
                <input type="email" name="email" class="form-input" placeholder="you@example.com" required autofocus>
            </div>
            <div class="form-group">
                <label class="form-label">Password</label>
                <input type="password" name="password" class="form-input" placeholder="••••••••" required>
            </div>
            <button type="submit" class="btn-submit">SIGN IN →</button>
        </form>

        <div class="divider">OR</div>

        <div class="auth-footer">
            Don't have an account? <a href="/register">Create one free →</a>
        </div>
    </div>
</div>
</body>
</html>
