<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>New Password — Fin-TAP</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg:#09091F; --surface:#1A1953; --surface2:#1E2160;
            --border:rgba(255,255,255,0.07); --border2:rgba(255,255,255,0.13);
            --accent:#C9A84C; --green:#2ECC8A; --red:#E05555;
            --text:#ECEEF8; --text2:#9BA8C7; --text3:#4E5A7A;
            --mono:'Space Mono',monospace; --sans:'Inter',sans-serif;
        }
        *,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
        body{font-family:var(--sans);background:var(--bg);color:var(--text);min-height:100vh;
             display:flex;align-items:center;justify-content:center;position:relative;overflow:hidden;
             -webkit-font-smoothing:antialiased;}
        body::before{content:'';position:fixed;inset:0;
            background-image:radial-gradient(circle,rgba(255,255,255,0.032) 1px,transparent 1px);
            background-size:32px 32px;pointer-events:none;}
        body::after{content:'';position:fixed;width:800px;height:500px;
            background:radial-gradient(ellipse at center,rgba(26,25,83,0.85) 0%,transparent 70%);
            top:-80px;left:50%;transform:translateX(-50%);pointer-events:none;}

        .auth-wrap{position:relative;z-index:1;width:100%;max-width:400px;padding:20px;
                   animation:fadeUp 0.4s ease both;}
        @keyframes fadeUp{from{opacity:0;transform:translateY(16px);}to{opacity:1;transform:translateY(0);}}

        .brand{text-align:center;margin-bottom:32px;}
        .brand-mark{width:48px;height:48px;background:rgba(201,168,76,0.08);border:1px solid rgba(201,168,76,0.3);
                    border-radius:12px;display:flex;align-items:center;justify-content:center;
                    font-size:1.3rem;margin:0 auto 12px;}
        .brand-name{font-family:var(--mono);font-weight:700;font-size:1rem;color:var(--text);letter-spacing:3px;}
        .brand-sub{font-family:var(--mono);font-size:0.58rem;color:var(--text3);letter-spacing:3px;margin-top:4px;}

        .auth-card{background:var(--surface);border:1px solid var(--border2);border-radius:16px;padding:32px;
                   box-shadow:0 24px 60px rgba(0,0,0,0.4);}
        .auth-title{font-size:1.25rem;font-weight:800;margin-bottom:6px;letter-spacing:-0.3px;}
        .auth-sub{font-size:0.8rem;color:var(--text2);margin-bottom:28px;line-height:1.5;}

        .form-group{margin-bottom:18px;}
        .form-label{display:block;font-size:0.75rem;font-weight:600;color:var(--text2);margin-bottom:7px;}
        .form-input{width:100%;background:var(--surface2);border:1px solid var(--border);color:var(--text);
                    padding:11px 14px;border-radius:8px;font-size:0.88rem;font-family:var(--sans);
                    outline:none;transition:border-color 0.2s;}
        .form-input:focus{border-color:var(--accent);}
        .form-input::placeholder{color:var(--text3);}

        .pw-rules{font-family:var(--mono);font-size:0.62rem;color:var(--text3);margin-top:6px;line-height:1.6;}

        .btn-submit{width:100%;background:var(--accent);color:#09060A;border:none;border-radius:8px;
                    padding:12px;font-family:var(--sans);font-weight:700;font-size:0.9rem;
                    cursor:pointer;transition:all 0.2s;letter-spacing:0.3px;margin-top:4px;}
        .btn-submit:hover{background:#D4B35A;transform:translateY(-1px);}

        .alert{padding:10px 14px;border-radius:8px;font-size:0.8rem;margin-bottom:20px;
               display:flex;align-items:center;gap:8px;}
        .alert-error{background:rgba(224,85,85,0.1);border:1px solid rgba(224,85,85,0.3);color:#f08080;}
    </style>
</head>
<body>
<div class="auth-wrap">
    <div class="brand">
        <div class="brand-mark">▲</div>
        <div class="brand-name">FIN-TAP</div>
        <div class="brand-sub">AI FINANCIAL ANALYSIS</div>
    </div>

    <div class="auth-card">
        <div class="auth-title">Set New Password</div>
        <div class="auth-sub">Choose a strong password for your account.</div>

        {% with messages = get_flashed_messages(with_categories=true) %}
        {% for cat, msg in messages %}
        <div class="alert alert-error"><span>⚠</span> {{ msg }}</div>
        {% endfor %}
        {% endwith %}

        <form method="POST">
            <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
            <div class="form-group">
                <label class="form-label">New Password</label>
                <input type="password" name="password" id="pw" class="form-input"
                       placeholder="••••••••" required autofocus oninput="checkPw()">
                <div class="pw-rules" id="pw-rules">Min. 8 characters · at least 1 letter + 1 digit</div>
            </div>
            <div class="form-group">
                <label class="form-label">Confirm Password</label>
                <input type="password" name="confirm" id="pw2" class="form-input"
                       placeholder="••••••••" required oninput="checkPw()">
            </div>
            <button type="submit" id="submit-btn" class="btn-submit">UPDATE PASSWORD →</button>
        </form>
    </div>
</div>
<script>
function checkPw() {
    const pw  = document.getElementById('pw').value;
    const pw2 = document.getElementById('pw2').value;
    const btn = document.getElementById('submit-btn');
    const ok  = pw.length >= 8 && /[a-zA-Z]/.test(pw) && /[0-9]/.test(pw) && pw === pw2;
    btn.style.opacity = ok ? '1' : '0.5';
    btn.disabled = !ok;
    document.getElementById('pw-rules').style.color =
        pw.length >= 8 && /[a-zA-Z]/.test(pw) && /[0-9]/.test(pw)
        ? 'var(--green)' : 'var(--text3)';
}
</script>
</body>
</html>
