<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>New Password — Fin-TAP</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg:#07090d; --surface:#0f1318; --surface2:#141920;
            --border:#1e2530; --accent:#00d4ff; --green:#00e676; --red:#ff4560;
            --text:#dde3ee; --text2:#8896ab; --text3:#4a5568;
            --mono:'Space Mono',monospace; --sans:'Syne',sans-serif;
        }
        *,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
        body{font-family:var(--sans);background:var(--bg);color:var(--text);min-height:100vh;
             display:flex;align-items:center;justify-content:center;position:relative;overflow:hidden;}
        body::before{content:'';position:fixed;inset:0;
            background-image:linear-gradient(rgba(0,212,255,0.025) 1px,transparent 1px),
                             linear-gradient(90deg,rgba(0,212,255,0.025) 1px,transparent 1px);
            background-size:48px 48px;pointer-events:none;}
        body::after{content:'';position:fixed;width:600px;height:600px;border-radius:50%;
            background:radial-gradient(circle,rgba(0,212,255,0.05) 0%,transparent 70%);
            top:50%;left:50%;transform:translate(-50%,-50%);pointer-events:none;}

        .auth-wrap{position:relative;z-index:1;width:100%;max-width:400px;padding:20px;
                   animation:fadeUp 0.4s ease both;}
        @keyframes fadeUp{from{opacity:0;transform:translateY(16px);}to{opacity:1;transform:translateY(0);}}

        .brand{text-align:center;margin-bottom:32px;}
        .brand-mark{width:48px;height:48px;background:rgba(0,212,255,0.08);border:1px solid rgba(0,212,255,0.25);
                    border-radius:12px;display:flex;align-items:center;justify-content:center;
                    font-size:1.3rem;margin:0 auto 12px;}
        .brand-name{font-family:var(--mono);font-weight:700;font-size:1rem;color:var(--accent);letter-spacing:3px;}
        .brand-sub{font-family:var(--mono);font-size:0.6rem;color:var(--text3);letter-spacing:3px;margin-top:4px;}

        .auth-card{background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:32px;}
        .auth-title{font-size:1.2rem;font-weight:800;margin-bottom:6px;}
        .auth-sub{font-size:0.8rem;color:var(--text2);margin-bottom:28px;line-height:1.5;}

        .form-group{margin-bottom:18px;}
        .form-label{display:block;font-size:0.75rem;font-weight:700;color:var(--text2);margin-bottom:7px;}
        .form-input{width:100%;background:var(--surface2);border:1px solid var(--border);color:var(--text);
                    padding:11px 14px;border-radius:8px;font-size:0.88rem;font-family:var(--sans);
                    outline:none;transition:border-color 0.2s;}
        .form-input:focus{border-color:var(--accent);}
        .form-input::placeholder{color:var(--text3);}

        .pw-rules{font-family:var(--mono);font-size:0.62rem;color:var(--text3);margin-top:6px;line-height:1.6;}

        .btn-submit{width:100%;background:var(--accent);color:#000;border:none;border-radius:8px;
                    padding:12px;font-family:var(--sans);font-weight:800;font-size:0.9rem;
                    cursor:pointer;transition:all 0.2s;letter-spacing:0.5px;margin-top:4px;}
        .btn-submit:hover{background:#fff;transform:translateY(-1px);}

        .alert{padding:10px 14px;border-radius:7px;font-size:0.8rem;margin-bottom:20px;
               display:flex;align-items:center;gap:8px;}
        .alert-error{background:rgba(255,69,96,0.1);border:1px solid rgba(255,69,96,0.3);color:#ff8fa3;}
    </style>
</head>
<body>
<div class="auth-wrap">
    <div class="brand">
        <div class="brand-mark">▲</div>
        <div class="brand-name">FIN-TAP</div>
        <div class="brand-sub">AI FINANCIAL ANALYSIS</div>
    </div>

    <div class="auth-card">
        <div class="auth-title">Set New Password</div>
        <div class="auth-sub">Choose a strong password for your account.</div>

        {% with messages = get_flashed_messages(with_categories=true) %}
        {% for cat, msg in messages %}
        <div class="alert alert-error"><span>⚠</span> {{ msg }}</div>
        {% endfor %}
        {% endwith %}

        <form method="POST">
            <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
            <div class="form-group">
                <label class="form-label">New Password</label>
                <input type="password" name="password" id="pw" class="form-input"
                       placeholder="••••••••" required autofocus oninput="checkPw()">
                <div class="pw-rules" id="pw-rules">Min. 8 characters · at least 1 letter + 1 digit</div>
            </div>
            <div class="form-group">
                <label class="form-label">Confirm Password</label>
                <input type="password" name="confirm" id="pw2" class="form-input"
                       placeholder="••••••••" required oninput="checkPw()">
            </div>
            <button type="submit" id="submit-btn" class="btn-submit">UPDATE PASSWORD →</button>
        </form>
    </div>
</div>
<script>
function checkPw() {
    const pw  = document.getElementById('pw').value;
    const pw2 = document.getElementById('pw2').value;
    const btn = document.getElementById('submit-btn');
    const ok  = pw.length >= 8 && /[a-zA-Z]/.test(pw) && /[0-9]/.test(pw) && pw === pw2;
    btn.style.opacity = ok ? '1' : '0.5';
    btn.disabled = !ok;
    document.getElementById('pw-rules').style.color =
        pw.length >= 8 && /[a-zA-Z]/.test(pw) && /[0-9]/.test(pw)
        ? 'var(--green)' : 'var(--text3)';
}
</script>
</body>
</html>
